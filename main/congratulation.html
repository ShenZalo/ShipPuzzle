<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Congratulations</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #b5f5c8 0%, #6ed29b 100%);
        font-family: Arial, Helvetica, sans-serif;
      }

      .card {
        width: min(92vw, 620px);
        padding: 2rem;
        border: 4px solid #123;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.8);
        text-align: center;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2.2rem, 5vw, 4rem);
        color: #114b2a;
      }

      p {
        margin: 0 0 1.5rem;
        font-size: 1.1rem;
        line-height: 1.5;
        color: #123;
      }

      .reply {
        display: inline-block;
        padding: 0.9rem 1.4rem;
        border-radius: 999px;
        background: #114b2a;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Congratulations!</h1>
      <p>You solved the puzzle. The English ship goes to Port Said and carries tea.</p>
      <a class="reply" href="index.html">Play again?</a>
    </main>
  </body>
</html>
