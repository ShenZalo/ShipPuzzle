<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="css/output.css" rel="stylesheet" />
    <title>Ship Puzzle</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #9fe8f1 0%, #74d7ea 52%, #45c4df 100%);
      }

      .page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem 6rem;
        gap: 1.25rem;
        text-align: center;
      }

      .title {
        max-width: 900px;
        font-size: clamp(2rem, 3.6vw, 3rem);
        line-height: 0.92;
        font-weight: 900;
        color: #000;
      }

      .line {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.8rem;
        flex-wrap: nowrap;
        font-size: clamp(1.1rem, 2vw, 1.8rem);
        font-weight: 900;
        color: #111;
      }

      .select-wrap {
        position: relative;
        display: inline-flex;
        align-items: center;
      }

      .select {
        width: 106px;
        height: 40px;
        border: 4px solid #111;
        border-radius: 8px;
        background: rgba(245, 250, 251, 0.55);
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        padding: 0 2.1rem 0 0.7rem;
        font: inherit;
        font-size: 1rem;
        font-weight: 700;
        color: #111;
      }

      .arrow {
        position: absolute;
        right: 0.8rem;
        width: 13px;
        height: 13px;
        border-right: 4px solid #111;
        border-bottom: 4px solid #111;
        transform: translateY(-2px) rotate(45deg);
        pointer-events: none;
      }

      .submit {
        position: fixed;
        right: 0.8rem;
        bottom: 0.55rem;
        border: 0;
        border-radius: 999px;
        padding: 0.8rem 1.6rem;
        min-width: 150px;
        background: linear-gradient(180deg, #ff6a00 0%, #ff4d00 100%);
        color: #fff;
        font: 700 1.2rem Arial, Helvetica, sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        box-shadow: 0 8px 18px rgba(255, 82, 0, 0.32);
        cursor: pointer;
      }

      .result {
        min-height: 1.5rem;
        margin-top: 0.5rem;
        font: 700 1rem Arial, Helvetica, sans-serif;
        color: #102a43;
      }

      .nav-prev {
        display: none;
      }

      @media (max-width: 900px) {
        .line {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="title">
        Which ship goes to Port Said? Which ship carries tea?<br />
        Draw a conclusion!
      </div>

      <div class="line">
        <div class="dots" aria-hidden="true"><i></i></div>

        <div class="select-wrap">
          <select class="select" id="portSaidSelect" aria-label="Ship going to Port Said">
            <option value="" selected>-</option>
            <option value="Greek">Greek ship</option>
            <option value="French">French ship</option>
            <option value="English">English ship</option>
            <option value="Brazilian">Brazilian ship</option>
            <option value="Spanish">Spanish ship</option>
          </select>
          <span class="arrow" aria-hidden="true"></span>
        </div>

        <div>goes to Port said AND</div>

        <div class="select-wrap">
          <select class="select" id="teaSelect" aria-label="Ship carrying tea">
            <option value="" selected>-</option>
            <option value="Greek">Greek ship</option>
            <option value="French">French ship</option>
            <option value="English">English ship</option>
            <option value="Brazilian">Brazilian ship</option>
            <option value="Spanish">Spanish ship</option>
          </select>
          <span class="arrow" aria-hidden="true"></span>
        </div>

        <div>carries tea</div>
      </div>

      <div class="result" id="resultMessage" aria-live="polite"></div>
    </main>

    <button class="submit" id="submitButton" type="button">SUBMIT</button>

    <script src="js/script.js"></script>

    <!-- Navigation Buttons -->
    <div class="w-full">
      <div class="fixed bottom-6 left-6 z-50">
        <button
          class="flex flex-col w-16 items-center hover:scale-110 transition-transform duration-300 cursor-pointer"
          onclick="location.href = 'puzzle.html'"
        >
          <img
            class="scale-x-[-1] w-full"
            src="https://i.ibb.co/35wVjxkn/icon-next.png"
          />
          <p class="text-center">Previous</p>
        </button>
      </div>
    </div>
  </body>
</html>
