<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="css/output.css" rel="stylesheet" />
    <link href="css/puzzle.css" rel="stylesheet" />
    <title>Ship Puzzle</title>
  </head>
  <body
    class="bg-blue-300 min-h-screen flex items-center justify-center overflow-hidden"
  >
    <div
      class="absolute top-10 left-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"
    ></div>
    <div
      class="absolute bottom-10 right-10 w-60 h-60 bg-cyan-300/10 rounded-full blur-3xl"
    ></div>
    <div
      class="relative bg-white/10 backdrop-blur-md border-4 border-white/20 rounded-3xl shadow-2xl p-12 max-w-4xl w-full mx-6"
    >
      <ocean-sway class="block text-center w-full">
        <div class="text-8xl mb-6">🚢</div>
      </ocean-sway>
      <h1
        class="text-7xl md:text-8xl font-extrabold text-center text-white drop-shadow-lg"
      >
        Ship Puzzle
      </h1>
      <p class="text-center text-blue-500 text-xl mt-4">
        Test your logic and solve the puzzle!
      </p>
      <div class="flex justify-center mt-12">
        <button
          class="px-10 py-4 text-3xl font-bold bg-blue-500 text-white rounded-2xl shadow-lg transition duration-300 hover:scale-110 hover:shadow-cyan-500/50 hover:cursor-pointer"
          onclick="location.href = 'instruction.html'"
        >
          Play
        </button>
      </div>
    </div>
  </body>
</html>
